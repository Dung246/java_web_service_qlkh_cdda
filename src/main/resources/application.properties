spring.application.name=java-web-service-qlkh-cdda

# ========================
# DATABASE
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/qlkh_cdda?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=Trandung2605
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========================
# REDIS
# ========================
spring.data.redis.host=localhost
spring.data.redis.port=6379
# spring.data.redis.password=   # bỏ comment nếu Redis có password
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# ========================
# SERVER
# ========================
server.port=8080

# ========================
# JWT
# ========================
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.access-token-expiration=1800000
app.jwt.refresh-token-expiration=604800000

# ========================
# FILE UPLOAD
# ========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# ========================
# CLOUDINARY
# ========================
cloudinary.cloud-name=your_cloud_name
cloudinary.api-key=your_api_key
cloudinary.api-secret=your_api_secret

# ========================
# LOGGING
# ========================
logging.level.com.java_web_service_qlkh_cdda=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ========================
# ACTUATOR
# ========================
management.endpoints.web.exposure.include=health,info,metrics